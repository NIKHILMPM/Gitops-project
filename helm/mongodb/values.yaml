namespace: chat-app

replicaCount: 1

labels:
  app: mongodb

image:
  repository: mongo
  tag: latest

containerPort: 27017

service:
  name: mongo
  port: 27017

statefulset:
  name: mongodb-statefulset

pv:
  name: mongodb-pv
  storage: 1Gi
  storageClass: mongodb-storage
  hostPath: /mnt/data

pvc:
  name: mongodb-pvc
  storage: 1Gi
  storageClass: mongodb-storage

