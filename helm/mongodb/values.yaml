  name: mongodb-secret
  username: cm9vdA== # base64
  password: YWRtaW4=
  jwt: eW91cl9qd3Rfc2VjcmV0X2tleQ==

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

vpa:
  name: mongodb-vpa
