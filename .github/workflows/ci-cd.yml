name: ChatApp CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKER_USER: ramachandrampm

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # Detect what changed
      - name: Detect Changed Services
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger detected"
            echo "services=frontend backend" >> $GITHUB_OUTPUT
          else
            echo "Detecting changes..."

            services=$(git diff HEAD^ HEAD --name-only 2>/dev/null | cut -d/ -f1 | sort -u)
            filtered=$(echo "$services" | grep -E 'frontend|backend' || true)

            if [ -z "$filtered" ]; then
              echo "No changes in frontend/backend"
              echo "services=" >> $GITHUB_OUTPUT
            else
              echo "Changed services: $filtered"
              echo "services=$filtered" >> $GITHUB_OUTPUT
            fi
          fi

      # Stop pipeline if nothing relevant changed
      - name: Stop if no changes
        if: steps.changes.outputs.services == ''
        run: |
          echo "No relevant changes. Skipping build."
          exit 0

      - name: Show detected services
        run: |
          echo "Services: ${{ steps.changes.outputs.services }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build & Push with proper semver increment
      - name: Build & Push Images (SemVer per service)
        run: |
          for svc in ${{ steps.changes.outputs.services }}
          do
            echo "========================================"
            echo "Processing service: $svc"

            # Get all tags
            TAGS=$(curl -s https://hub.docker.com/v2/repositories/${DOCKER_USER}/chat-app-$svc/tags?page_size=100 \
              | jq -r '.results[].name')

            # Get highest semver tag
            LATEST=$(echo "$TAGS" | grep -E '^v1\.0\.[0-9]+$' | sort -V | tail -n 1)

            echo "Latest semver tag: $LATEST"

            # Increment version
            if [[ "$LATEST" =~ ^v1\.0\.([0-9]+)$ ]]; then
              NUM=${BASH_REMATCH[1]}
              NEW_NUM=$((NUM + 1))
            else
              NEW_NUM=1
            fi

            NEW_TAG="v1.0.$NEW_NUM"
            IMAGE="${DOCKER_USER}/chat-app-$svc:$NEW_TAG"

            echo "New tag: $NEW_TAG"
            echo "Building image: $IMAGE"

            docker build -t $IMAGE ./$svc

            echo "Pushing image: $IMAGE"
            docker push $IMAGE

            echo "========================================"
          done